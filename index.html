<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cat Character Creator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="ui">
    <h2>Character Creator</h2>

    <label>Fur Color</label>
    <input type="color" id="furColor" value="#ff9900">

    <label>Rotate</label>
    <input type="range" id="rotation" min="0" max="360" value="0">

</div>

<div id="viewer"></div>

<script type="module" src="script.js"></script>
</body>
</html>
