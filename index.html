<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Character Creator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>

<body>

<div id="ui">

<h2>Character Creator</h2>

<label>Choose Character</label><br>

<button id="catButton">Cat</button>
<button id="sharkButton">Shark</button>

<br><br>

<label>Fur Color</label>
<input type="color" id="furColor" value="#ff9900">

<br><br>

<label>Size</label>
<input type="range" id="sizeSlider" min="0.5" max="3" step="0.1" value="1">

</div>

<script src="sketch.js"></script>

</body>
</html>
